services:
  warmteverlies:
    image: ghcr.io/openaec-foundation/warmteverliesberekening:latest
    build:
      context: .
      args:
        VITE_OIDC_ISSUER: https://auth.open-aec.com/application/o/warmteverlies/
        VITE_OIDC_CLIENT_ID: warmteverlies
        SOURCE_HASH: ${SOURCE_HASH:-dev}
    container_name: warmteverlies
    env_file: .env.production
    volumes:
      - warmteverlies-data:/data
    expose:
      - "3001"
    networks:
      - platform
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_ROLLING_RESTART=true
    restart: unless-stopped

volumes:
  warmteverlies-data:

networks:
  platform:
    name: 3bm_platform
    external: true
